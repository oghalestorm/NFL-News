<!DOCTYPE html>
<html>
<head>
<title>NFL Team News Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

#updateTime{
margin-bottom:20px;
font-size:14px;
color:#cbd5f5;
}

/* Division sections */

.division{
margin:30px;
padding:20px;
border-radius:12px;
}

.division h2{
margin-bottom:15px;
}

/* Grid for teams */

.teams{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* Team cards */

.team{
background:#1e293b;
padding:15px;
border-radius:10px;
transition:0.2s;
}

.team:hover{
transform:translateY(-5px);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

.team h3{
margin-bottom:8px;
font-size:16px;
}

.team a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}

.team a:hover{
text-decoration:underline;
}

/* Division colors */

.afcEast{background:#1e3a8a;}
.afcNorth{background:#7f1d1d;}
.afcSouth{background:#134e4a;}
.afcWest{background:#78350f;}

.nfcEast{background:#312e81;}
.nfcNorth{background:#166534;}
.nfcSouth{background:#9f1239;}
.nfcWest{background:#0f766e;}

</style>
</head>

<body>

<h1>NFL Latest Team News</h1>
<div id="updateTime"></div>

<div id="dashboard"></div>

<script>

const apiKey="YOUR_API_KEY_HERE";

/* Divisions */

const divisions={
"AFC East":["BUF","MIA","NE","NYJ"],
"AFC North":["BAL","CIN","CLE","PIT"],
"AFC South":["HOU","IND","JAX","TEN"],
"AFC West":["DEN","KC","LV","LAC"],

"NFC East":["DAL","NYG","PHI","WAS"],
"NFC North":["CHI","DET","GB","MIN"],
"NFC South":["ATL","CAR","NO","TB"],
"NFC West":["ARI","LAR","SF","SEA"]
};

/* Team names */

const teamNames={
ARI:"Arizona Cardinals",
ATL:"Atlanta Falcons",
BAL:"Baltimore Ravens",
BUF:"Buffalo Bills",
CAR:"Carolina Panthers",
CHI:"Chicago Bears",
CIN:"Cincinnati Bengals",
CLE:"Cleveland Browns",
DAL:"Dallas Cowboys",
DEN:"Denver Broncos",
DET:"Detroit Lions",
GB:"Green Bay Packers",
HOU:"Houston Texans",
IND:"Indianapolis Colts",
JAX:"Jacksonville Jaguars",
KC:"Kansas City Chiefs",
LV:"Las Vegas Raiders",
LAC:"Los Angeles Chargers",
LAR:"Los Angeles Rams",
MIA:"Miami Dolphins",
MIN:"Minnesota Vikings",
NE:"New England Patriots",
NO:"New Orleans Saints",
NYG:"New York Giants",
NYJ:"New York Jets",
PHI:"Philadelphia Eagles",
PIT:"Pittsburgh Steelers",
SF:"San Francisco 49ers",
SEA:"Seattle Seahawks",
TB:"Tampa Bay Buccaneers",
TEN:"Tennessee Titans",
WAS:"Washington Commanders"
};

const dashboard=document.getElementById("dashboard");

async function loadNews(){

dashboard.innerHTML="";

for(const division in divisions){

const section=document.createElement("div");

/* add division color class */

const className=division.replace(" ","");
section.className="division "+className.charAt(0).toLowerCase()+className.slice(1);

section.innerHTML=`<h2>${division}</h2><div class="teams"></div>`;

const teamContainer=section.querySelector(".teams");

dashboard.appendChild(section);

for(const team of divisions[division]){

const card=document.createElement("div");
card.className="team";

card.innerHTML=`
<h3>${teamNames[team]}</h3>
<p>Loading...</p>
`;

teamContainer.appendChild(card);

try{

const response=await fetch(`https://api.sportsdata.io/v3/nfl/scores/json/NewsByTeam/${team}?key=${apiKey}`);

const data=await response.json();

if(data && data.length>0){

card.innerHTML=`
<h3>${teamNames[team]}</h3>
<a href="${data[0].Url}" target="_blank">${data[0].Title}</a>
<p>${data[0].Content.substring(0,120)}...</p>
`;

}else{

card.innerHTML=`
<h3>${teamNames[team]}</h3>
<p>No news available.</p>
`;

}

}catch{

card.innerHTML=`
<h3>${teamNames[team]}</h3>
<p>Could not load news.</p>
`;

}

}

}

document.getElementById("updateTime").innerText=
"Last updated: "+new Date().toLocaleTimeString();

}

loadNews();

setInterval(loadNews,1800000);

</script>

</body>
</html>
