<!DOCTYPE html>
<html>
<head>
<title>Live NFL News</title>

<style>

body{
font-family:Arial;

color:white;
margin:0;
text-align:center;
}

h1{

}

}

.division{
margin:40px 20px;
}

.division h2{
text-align:left;
border-bottom:2px solid #334155;
padding-bottom:5px;
}

.teamGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:18px;
}

.team{
background:#1e293b;
padding:15px;
border-radius:10px;
border-top:6px solid white;
text-align:left;
transition:0.2s;
}

.team:hover{
transform:scale(1.03);
}

.teamHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:8px;
}

.logo{
width:34px;
height:34px;
}

.team a{
color:#60a5fa;
font-weight:bold;
text-decoration:none;
}

</head>

<h1>Live NFL News</h1>
<div id="updateTime"></div>
<div id="teams"></div>

const logos={

ATL:"https://a.espncdn.com/i/teamlogos/nfl/500/atl.png",

MIN:"https://a.espncdn.com/i/teamlogos/nfl/500/min.png",
NE:"https://a.espncdn.com/i/teamlogos/nfl/500/ne.png",

NYG:"https://a.espncdn.com/i/teamlogos/nfl/500/nyg.png",

};

const container=document.getElementById("teams");

/* ESPN NEWS */

async function getESPNNews(teamName){

try{

const response=await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.espn.com/espn/rss/nfl/news");
const data=await response.json();

for(const article of data.items){

const text=(article.title+" "+article.description).toLowerCase();

if(text.includes(teamName.split(" ")[1].toLowerCase())){
return {
title:article.title,
url:article.link,
content:article.description
};
}

}

}catch(e){}

return null;

}

/* SPORTSDATA FALLBACK */

async function getSportsDataNews(team){

try{

const response=await fetch(`https://api.sportsdata.io/v3/nfl/scores/json/NewsByTeam/${team}?key=${apiKey}`);
const data=await response.json();

if(data && data.length>0){

return{
title:data[0].Title,
url:data[0].Url,
content:data[0].Content
};

}

}catch(e){}

return null;

}

/* MAIN LOADER */

async function loadNews(){

container.innerHTML="";

for(const division in divisions){

const divBlock=document.createElement("div");
divBlock.className="division";
divBlock.innerHTML=`<h2>${division}</h2>`;

const grid=document.createElement("div");
grid.className="teamGrid";

const teams=divisions[division].sort();

for(const team of teams){

const card=document.createElement("div");
card.className="team";
card.style.borderTopColor=teamColors[team];

grid.appendChild(card);

let article=await getESPNNews(teamNames[team]);

if(!article){
article=await getSportsDataNews(team);
}

if(article){

card.innerHTML=`
<div class="teamHeader">
<img class="logo" src="${logos[team]}">
<h3>${teamNames[team]}</h3>
</div>
<a href="${article.url}" target="_blank">${article.title}</a>
<p>${summarize(article.content)}</p>
`;

}else{

card.innerHTML=`
<div class="teamHeader">
<img class="logo" src="${logos[team]}">
<h3>${teamNames[team]}</h3>
</div>
<p>No recent headline.</p>
`;

}

}

divBlock.appendChild(grid);
container.appendChild(divBlock);

}

document.getElementById("updateTime").innerText="As Of: "+new Date().toLocaleTimeString();

}
function summarize(text, maxLength=140){

if(!text) return "";

const clean=text.replace(/<[^>]*>/g,""); // remove HTML tags

if(clean.length<=maxLength) return clean;

let shortened=clean.substring(0,maxLength);

const lastPeriod=shortened.lastIndexOf(".");
const lastSpace=shortened.lastIndexOf(" ");

if(lastPeriod>80){
return shortened.substring(0,lastPeriod+1);
}

return shortened.substring(0,lastSpace)+"...";
}
loadNews();
setInterval(loadNews,1800000);

</script>
