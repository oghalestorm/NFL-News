<!DOCTYPE html>
<html>
<head>
<title>NFL Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

h1{
margin:20px;
}

#updateTime{
margin-bottom:20px;
font-size:14px;
color:#cbd5f5;
}

.division{
margin:30px;
}

.teamGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.team{
border-radius:10px;
padding:15px;
cursor:pointer;
transition:.2s;
}

.team:hover{
transform:scale(1.03);
}

.team img{
width:55px;
}

.team a{
color:white;
font-weight:bold;
text-decoration:none;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
overflow:auto;
}

.modalContent{
background:#1e293b;
margin:60px auto;
padding:25px;
width:80%;
max-width:800px;
border-radius:10px;
}

.close{
float:right;
font-size:22px;
cursor:pointer;
}

.rosterGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.player{
background:#334155;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<h1>NFL Dashboard</h1>
<div id="updateTime"></div>
<div id="content"></div>

<div id="rosterModal" class="modal">
<div class="modalContent">
<span class="close" onclick="closeRoster()">✖</span>
<h2 id="rosterTitle"></h2>
<div id="rosterContent" class="rosterGrid"></div>
</div>
</div>

<script>

const apiKey="1aac3916c7694b6c8a1773a059a4aaf5";

const divisions={
"AFC East":[
{code:"BUF",name:"Buffalo Bills",color:"#00338D",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/buf.png"},
{code:"MIA",name:"Miami Dolphins",color:"#008E97",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/mia.png"},
{code:"NE",name:"New England Patriots",color:"#002244",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/ne.png"},
{code:"NYJ",name:"New York Jets",color:"#125740",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/nyj.png"}
],
"AFC North":[
{code:"BAL",name:"Baltimore Ravens",color:"#241773",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/bal.png"},
{code:"CIN",name:"Cincinnati Bengals",color:"#FB4F14",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/cin.png"},
{code:"CLE",name:"Cleveland Browns",color:"#311D00",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/cle.png"},
{code:"PIT",name:"Pittsburgh Steelers",color:"#FFB612",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/pit.png"}
],
"AFC South":[
{code:"HOU",name:"Houston Texans",color:"#03202F",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/hou.png"},
{code:"IND",name:"Indianapolis Colts",color:"#002C5F",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/ind.png"},
{code:"JAX",name:"Jacksonville Jaguars",color:"#006778",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/jax.png"},
{code:"TEN",name:"Tennessee Titans",color:"#0C2340",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/ten.png"}
],
"AFC West":[
{code:"DEN",name:"Denver Broncos",color:"#FB4F14",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/den.png"},
{code:"KC",name:"Kansas City Chiefs",color:"#E31837",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/kc.png"},
{code:"LV",name:"Las Vegas Raiders",color:"#000000",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/lv.png"},
{code:"LAC",name:"Los Angeles Chargers",color:"#0080C6",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/lac.png"}
],
"NFC East":[
{code:"DAL",name:"Dallas Cowboys",color:"#041E42",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/dal.png"},
{code:"NYG",name:"New York Giants",color:"#0B2265",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/nyg.png"},
{code:"PHI",name:"Philadelphia Eagles",color:"#004C54",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/phi.png"},
{code:"WAS",name:"Washington Commanders",color:"#5A1414",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/wsh.png"}
],
"NFC North":[
{code:"CHI",name:"Chicago Bears",color:"#0B162A",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/chi.png"},
{code:"DET",name:"Detroit Lions",color:"#0076B6",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/det.png"},
{code:"GB",name:"Green Bay Packers",color:"#203731",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/gb.png"},
{code:"MIN",name:"Minnesota Vikings",color:"#4F2683",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/min.png"}
],
"NFC South":[
{code:"ATL",name:"Atlanta Falcons",color:"#A71930",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/atl.png"},
{code:"CAR",name:"Carolina Panthers",color:"#0085CA",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/car.png"},
{code:"NO",name:"New Orleans Saints",color:"#D3BC8D",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/no.png"},
{code:"TB",name:"Tampa Bay Buccaneers",color:"#D50A0A",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/tb.png"}
],
"NFC West":[
{code:"ARI",name:"Arizona Cardinals",color:"#97233F",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/ari.png"},
{code:"LAR",name:"Los Angeles Rams",color:"#003594",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/lar.png"},
{code:"SF",name:"San Francisco 49ers",color:"#AA0000",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/sf.png"},
{code:"SEA",name:"Seattle Seahawks",color:"#002244",logo:"https://a.espncdn.com/i/teamlogos/nfl/500/sea.png"}
]
};

const content=document.getElementById("content");

async function loadTeams(){

content.innerHTML="";

const standings=await fetch(`https://api.sportsdata.io/v3/nfl/scores/json/Standings/2023?key=${apiKey}`);
const standingsData=await standings.json();

for(const division in divisions){

const section=document.createElement("div");
section.className="division";

section.innerHTML=`<h2>${division}</h2><div class="teamGrid"></div>`;
content.appendChild(section);

const grid=section.querySelector(".teamGrid");

for(const team of divisions[division]){

const standing=standingsData.find(t=>t.Team===team.code);

const card=document.createElement("div");
card.className="team";
card.style.background=team.color;

card.onclick=()=>openRoster(team);

card.innerHTML=`
<img src="${team.logo}">
<h3>${team.name}</h3>
<p>${standing ? standing.Wins+"-"+standing.Losses : ""}</p>
<p>Loading score...</p>
`;

grid.appendChild(card);

try{

const score=await fetch(`https://api.sportsdata.io/v3/nfl/scores/json/ScoresByWeek/2023/1?key=${apiKey}`);
const scoreData=await score.json();

const game=scoreData.find(g=>g.HomeTeam===team.code || g.AwayTeam===team.code);

if(game){

card.innerHTML+=`<p>Last Score: ${game.HomeScore}-${game.AwayScore}</p>`;

}

}catch{}

}

}

document.getElementById("updateTime").innerText="Last updated: "+new Date().toLocaleTimeString();

}

async function openRoster(team){

document.getElementById("rosterModal").style.display="block";
document.getElementById("rosterTitle").innerText=team.name+" Roster";

const roster=await fetch(`https://api.sportsdata.io/v3/nfl/scores/json/Players/${team.code}?key=${apiKey}`);
const players=await roster.json();

const rosterDiv=document.getElementById("rosterContent");
rosterDiv.innerHTML="";

players.slice(0,20).forEach(p=>{

const player=document.createElement("div");

player.className="player";

player.innerHTML=`
<b>${p.Name}</b><br>
${p.Position}<br>
#${p.Number}
`;

rosterDiv.appendChild(player);

});

}

function closeRoster(){
document.getElementById("rosterModal").style.display="none";
}

loadTeams();

setInterval(loadTeams,1800000);

</script>

</body>
</html>
