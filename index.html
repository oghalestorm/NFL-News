<!DOCTYPE html>
<html>
<head>
<title>Live NFL News</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

h1{
margin-top:20px;
}

#updateTime{
margin-bottom:20px;
color:#cbd5f5;
}

.division{
margin:40px 20px;
}

.division h2{
text-align:left;
border-bottom:2px solid #334155;
padding-bottom:5px;
}

.teamGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.team{
background:#1e293b;
padding:15px;
border-radius:10px;
border-top:6px solid white;
text-align:left;
}

.team a{
color:#60a5fa;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Live NFL News</h1>
<div id="updateTime"></div>
<div id="teams"></div>

<script>

const apiKey="1aac3916c7694b6c8a1773a059a4aaf5";

const divisions={
"AFC East":["BUF","MIA","NE","NYJ"],
"AFC North":["BAL","CIN","CLE","PIT"],
"AFC South":["HOU","IND","JAX","TEN"],
"AFC West":["DEN","KC","LV","LAC"],
"NFC East":["DAL","NYG","PHI","WAS"],
"NFC North":["CHI","DET","GB","MIN"],
"NFC South":["ATL","CAR","NO","TB"],
"NFC West":["ARI","LAR","SF","SEA"]
};

const teamNames={
ARI:"Arizona Cardinals",
ATL:"Atlanta Falcons",
BAL:"Baltimore Ravens",
BUF:"Buffalo Bills",
CAR:"Carolina Panthers",
CHI:"Chicago Bears",
CIN:"Cincinnati Bengals",
CLE:"Cleveland Browns",
DAL:"Dallas Cowboys",
DEN:"Denver Broncos",
DET:"Detroit Lions",
GB:"Green Bay Packers",
HOU:"Houston Texans",
IND:"Indianapolis Colts",
JAX:"Jacksonville Jaguars",
KC:"Kansas City Chiefs",
LV:"Las Vegas Raiders",
LAC:"Los Angeles Chargers",
LAR:"Los Angeles Rams",
MIA:"Miami Dolphins",
MIN:"Minnesota Vikings",
NE:"New England Patriots",
NO:"New Orleans Saints",
NYG:"New York Giants",
NYJ:"New York Jets",
PHI:"Philadelphia Eagles",
PIT:"Pittsburgh Steelers",
SF:"San Francisco 49ers",
SEA:"Seattle Seahawks",
TB:"Tampa Bay Buccaneers",
TEN:"Tennessee Titans",
WAS:"Washington Commanders"
};

const teamColors={
ARI:"#97233F",
ATL:"#A71930",
BAL:"#241773",
BUF:"#00338D",
CAR:"#0085CA",
CHI:"#0B162A",
CIN:"#FB4F14",
CLE:"#311D00",
DAL:"#003594",
DEN:"#FB4F14",
DET:"#0076B6",
GB:"#203731",
HOU:"#03202F",
IND:"#002C5F",
JAX:"#006778",
KC:"#E31837",
LV:"#000000",
LAC:"#0080C6",
LAR:"#003594",
MIA:"#008E97",
MIN:"#4F2683",
NE:"#002244",
NO:"#D3BC8D",
NYG:"#0B2265",
NYJ:"#125740",
PHI:"#004C54",
PIT:"#FFB612",
SF:"#AA0000",
SEA:"#002244",
TB:"#D50A0A",
TEN:"#4B92DB",
WAS:"#5A1414"
};

const container=document.getElementById("teams");

async function loadNews(){

container.innerHTML="";

try{

const response=await fetch(`https://api.sportsdata.io/v3/nfl/scores/json/News?key=${apiKey}`);
const news=await response.json();

for(const division in divisions){

const divBlock=document.createElement("div");
divBlock.className="division";
divBlock.innerHTML=`<h2>${division}</h2>`;

const grid=document.createElement("div");
grid.className="teamGrid";

const teams=divisions[division].sort();

for(const team of teams){

const card=document.createElement("div");
card.className="team";
card.style.borderTopColor=teamColors[team];

const teamArticle=news.find(article =>
article.Teams && article.Teams.includes(team)
);

if(teamArticle){

card.innerHTML=`
<h3>${teamNames[team]}</h3>
<a href="${teamArticle.Url}" target="_blank">${teamArticle.Title}</a>
<p>${(teamArticle.Content || "").substring(0,120)}...</p>
`;

}else{

card.innerHTML=`
<h3>${teamNames[team]}</h3>
<p>No recent headline.</p>
`;

}

grid.appendChild(card);

}

divBlock.appendChild(grid);
container.appendChild(divBlock);

}

document.getElementById("updateTime").innerText=
"Last updated: "+new Date().toLocaleTimeString();

}catch(error){

console.error(error);
container.innerHTML="<p>Failed to load NFL news.</p>";

}

}

loadNews();
setInterval(loadNews,1800000);

</script>

</body>
</html>
