<!DOCTYPE html>
<html>
<head>
<title>NFL Team News Dashboard</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#updateTime{
margin-bottom:20px;
font-size:14px;
color:#cbd5f5;
}

#teams{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.team{
background:#1e293b;
padding:15px;
border-radius:10px;
}

.team h2{
font-size:18px;
margin-bottom:10px;
}

.team a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}

.team a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<h1>NFL Latest Team News</h1>

<div id="updateTime"></div>

<div id="teams"></div>

<script>

const apiKey = "1aac3916c7694b6c8a1773a059a4aaf5";

const teams = [
"ARI","ATL","BAL","BUF","CAR","CHI","CIN","CLE",
"DAL","DEN","DET","GB","HOU","IND","JAX","KC",
"LV","LAC","LAR","MIA","MIN","NE","NO","NYG",
"NYJ","PHI","PIT","SF","SEA","TB","TEN","WAS"
];

const teamNames = {
ARI:"Arizona Cardinals",
ATL:"Atlanta Falcons",
BAL:"Baltimore Ravens",
BUF:"Buffalo Bills",
CAR:"Carolina Panthers",
CHI:"Chicago Bears",
CIN:"Cincinnati Bengals",
CLE:"Cleveland Browns",
DAL:"Dallas Cowboys",
DEN:"Denver Broncos",
DET:"Detroit Lions",
GB:"Green Bay Packers",
HOU:"Houston Texans",
IND:"Indianapolis Colts",
JAX:"Jacksonville Jaguars",
KC:"Kansas City Chiefs",
LV:"Las Vegas Raiders",
LAC:"Los Angeles Chargers",
LAR:"Los Angeles Rams",
MIA:"Miami Dolphins",
MIN:"Minnesota Vikings",
NE:"New England Patriots",
NO:"New Orleans Saints",
NYG:"New York Giants",
NYJ:"New York Jets",
PHI:"Philadelphia Eagles",
PIT:"Pittsburgh Steelers",
SF:"San Francisco 49ers",
SEA:"Seattle Seahawks",
TB:"Tampa Bay Buccaneers",
TEN:"Tennessee Titans",
WAS:"Washington Commanders"
};

const container = document.getElementById("teams");

async function loadNews(){

container.innerHTML="";

for(const team of teams){

const card=document.createElement("div");
card.className="team";

card.innerHTML=`
<h2>${teamNames[team]}</h2>
<p>Loading...</p>
`;

container.appendChild(card);

try{

const response=await fetch(`https://api.sportsdata.io/v3/nfl/scores/json/NewsByTeam/${team}?key=${apiKey}`);

const data=await response.json();

if(data && data.length>0){

card.innerHTML=`
<h2>${teamNames[team]}</h2>
<a href="${data[0].Url}" target="_blank">${data[0].Title}</a>
<p>${data[0].Content.substring(0,120)}...</p>
`;

}else{

card.innerHTML=`
<h2>${teamNames[team]}</h2>
<p>No news available.</p>
`;

}

}catch(error){

card.innerHTML=`
<h2>${teamNames[team]}</h2>
<p>Could not load news.</p>
`;

}

}

document.getElementById("updateTime").innerText =
"Last updated: " + new Date().toLocaleTimeString();

}

loadNews();

setInterval(loadNews,1800000);

</script>

</body>
</html>
